      <p>我們這種高敏感度族群有著豐富的內心世界. 當每天有腦袋空閒的時候, 像是搭車通勤, 運動, 洗澡的時候都會慢慢的回味今天所發生的事物; 例如家人, 朋友, 在電車上讓位給老年人的青年, 為了送還陌生人掉落的東西而奔跑迷路的少女和為了小小誤會鬧翻的朋友怎麼重修舊好; 每天的這些時間, 讓我能想起這些微小而溫柔的事情, 好好的回味. (思緒反芻? XD)</p>
