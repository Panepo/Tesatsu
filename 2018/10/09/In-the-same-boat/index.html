      <p>漂流武士中, 織田信長的話語:<br><blockquote><p>吳越同舟什麼的, 只是說好聽的. 危機迫近之時就不會產生衝突和不合什麼的, 這種好事怎麼可能有? 有人老是指責別人的失誤, 有人老是將自己的功勞掛在嘴邊. 平時的這些小的不和, 就算可以暫時隱忍, 也會不挑時間地爆發出來; 不如說, 就是會在生死關頭才會爆發出來.</p>
</blockquote></p>
