      <p><center><img src="/Tesatsu/2018/08/20/Shaman-Girl/ShamanGirl.bmp" title="Shaman"></center><br>這張苗族巫女的繪畫圖, 不知道為何成為深度學習超解像度(Super Resolution)的範例圖片, 我想在於那些描寫細膩的頭飾和頸飾是良好的判別部分.</p>
<p>話說從以前就很喜歡這類型的民族服飾, 大概是從漫畫三隻眼開始吧? 念書的時候圖書館休閒區有一套三隻眼, 有空閒的時候就常常在那邊消磨時光.</p>
